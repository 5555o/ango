<script>
function gacha() {

    const rand = Math.random() * 100;
    let result = "";

    if (rand < 1) {
        result = "UR ⭐ 神の戦士";
    }
    else if (rand < 4) {
        result = "SSR ⭐ ドラゴン";
    }
    else if (rand < 10) {
        result = "SR ⭐ 魔法使い";
    }
    else if (rand < 20) {
        result = "R ⭐ 剣士";
    }
    else {
        result = "N ⭐ スライム";
    }

    document.getElementById("result").textContent = result;

}
</script>
